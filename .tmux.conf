# =============================================================================
# Tmux 配置文件
# 前缀键： Ctrl-a    重载： prefix r   插件管理： prefix I / U / alt-u
# =============================================================================


# ============================== 1. 基础与前缀键 ==============================
unbind C-b                            # 取消默认前缀 Ctrl-b
set  -g prefix C-a                    # 改用 Ctrl-a（与 GNU screen 一致）
bind a send-prefix                    # screen 风格：prefix a 透传一个 Ctrl-a

set -sg escape-time 10                # vim/nvim 里 <Esc> 立即生效
set  -g focus-events on               # 启用 FocusGained/Lost 事件
set  -g mouse on                      # 鼠标：滚轮/点击/拖拽
set  -g history-limit 50000           # 回滚行数


# ============================== 2. 颜色与终端 ================================
set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,alacritty:RGB"


# ============================== 3. 编号与窗口管理 ============================
set  -g base-index 1                  # window 编号从 1 开始
setw -g pane-base-index 1             # pane 编号从 1 开始
setw -g automatic-rename on           # 用前台程序名自动命名 window
set  -g renumber-windows on           # 关闭 window 后重排编号
set  -g set-titles on                 # 同步终端窗口标题


# ============================== 4. 提示与活动监视 ============================
set -g display-panes-time 800         # prefix q 显示 pane 编号的时长 (ms)
set -g display-time       1000        # 状态消息显示时长 (ms)
set -g status-interval    5           # 状态栏刷新间隔 (s)

set -g monitor-activity on            # 后台 window 有输出 → 状态栏 flag 高亮
set -g visual-activity   off          # 但不要弹文字消息打扰


# ============================== 5. 配置热重载 ================================
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"


# ============================== 6. 切分与新建（继承当前路径） ================
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"


# ============================== 7. Pane 移动 / 调整 ==========================
# vim 风格 hjkl 切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 大写 HJKL 调整尺寸；-r 允许一次 prefix 后连续按
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ============================== 8. Copy-mode (vi) ============================
setw -g mode-keys vi
# v 开始选择，y 复制并退出（macOS：pbcopy；Linux 换 xclip / wl-copy）
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# ============================== 9. Popup 浮窗（tmux ≥ 3.2） ==================
bind g display-popup -E -w 80% -h 80% "lazygit"
bind ! display-popup -E -w 60% -h 50% "$SHELL"


# ============================== 10. 嵌套 tmux 切换 ===========================
# SSH 进入远端再起一层 tmux 时，按 F12 让外层"放权"，再按 F12 收回
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=gray" \;\
  refresh-client -S
bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S


# ============================== 11. 插件列表（TPM） ==========================
# 首次安装：
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# 在 tmux 内：prefix I 安装  /  prefix U 更新  /  prefix alt-u 清理
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'        # prefix C-s 保存 / C-r 恢复
set -g @plugin 'tmux-plugins/tmux-continuum'        # 自动定时保存（依赖 resurrect）
set -g @plugin 'tmux-plugins/tmux-yank'             # 一键复制到系统剪贴板
set -g @plugin 'tmux-plugins/tmux-open'             # copy-mode 下 o 打开 url
set -g @plugin 'sainnhe/tmux-fzf'                   # fzf 驱动的多功能选择器
set -g @plugin 'catppuccin/tmux#v2.3.0'             # 主题（v2 系列）


# ============================== 12. 插件配置 =================================
# --- resurrect / continuum：自动恢复上次会话 ---------------------------------
set -g @continuum-restore               'on'
set -g @resurrect-capture-pane-contents 'on'

# --- catppuccin v2：主题与状态栏 ---------------------------------------------
# v2 与 v0/v1 不兼容；变量改名、status-left/right 需用 #{E:@catppuccin_status_*}

# ---------- 主题色调 ----------
set -g @catppuccin_flavor 'mocha'                       # latte / frappe / macchiato / mocha

# ---------- Window 标签外观 ----------
set -g @catppuccin_window_status_style    'rounded'     # basic / rounded / slanted / custom / none
set -g @catppuccin_window_number_position 'left'        # 数字 在 文字左 还是 右
set -g @catppuccin_window_text            ' #T'         # 普通 window 显示前台程序名
set -g @catppuccin_window_current_text    ' #T'         # 当前 window 显示前台程序名
set -g @catppuccin_window_flags            'icon'        # icon / text / none，需 Nerd Font

# ---------- 模块分隔符（圆角，需 Nerd Font） ----------
set -g @catppuccin_status_left_separator   ''
set -g @catppuccin_status_middle_separator ''
set -g @catppuccin_status_right_separator  ''
# yes = 模块紧贴成一整块（左圆角→...→右圆角），整体观感最好；
# no  = 模块之间用默认背景隔开，每个模块单独显示完整圆角，但容易出现裁剪缺角
set -g @catppuccin_status_connect_separator 'yes'

# ---------- 时间格式 ----------
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# ---------- Pane 边框信息 ----------
set -g @catppuccin_pane_status_enabled 'yes'            # 启用 pane 边框信息
set -g @catppuccin_pane_border_status  'top'            # off / top / bottom，边框文字位置

# ---------- 状态栏长度（避免内容被截断） ----------
set -g status-left-length  500
set -g status-right-length 500
set -g status-position     bottom

# ---------- 状态栏左侧：会话名 ----------
set -g  status-left  "#{E:@catppuccin_status_session}"

# ---------- 状态栏右侧：当前目录 + 时间 ----------
# 注：window 标签已显示前台程序名 #T，故不再加 application 模块；
#     host 仅在 SSH 场景有价值，本机隐藏避免拥挤。
set -g  status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ============================== 13. TPM 初始化（必须最后） ===================
run '~/.tmux/plugins/tpm/tpm'